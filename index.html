        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: var(--unapi-roxo);
        font-family: var(--unapi-fonte);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
        overflow-y: auto;
        user-select: none;
      }

      .header-panel {
        background-color: var(--unapi-roxo);
        padding: 20px 40px;
        border-radius: var(--unapi-borda);
        box-shadow: var(--unapi-sombra);
        z-index: 50;
        min-width: 500px;
        margin-bottom: 20px;
        border: none;
      }

      .header-panel h1 {
        color: var(--unapi-amarelo);
        font-size: 26px;
        margin-bottom: 15px;
        font-weight: 700;
        text-align: center;
      }

      .instructions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        font-size: 16px;
        color: var(--unapi-fundo);
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 15px 25px;
        border-radius: 12px;
        text-align: left;
      }

      .instructions span {
        line-height: 1.4;
      }

      .instructions strong {
        color: var(--unapi-amarelo);
        margin-right: 5px;
      }

      #game-board {
        width: 1100px;
        height: 700px;
        position: relative;
        touch-action: none;
      }

      .trunk-img {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        height: 420px;
        width: auto;
        pointer-events: none;
        filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.1));
      }

      .leaves-base {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 850px;
        height: 95px;
        background: rgba(0, 0, 0, 0.78);
        border: 2px solid rgba(255, 248, 220, 0.35);
        border-radius: 18px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        z-index: 1;
      }

      .drop-zone {
        position: absolute;
        width: 60px;
        height: 60px;
        border: 3px dashed rgba(84, 42, 88, 0.4);
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.5);
        transition: all 0.3s ease;
      }

      .drop-zone.hover {
        border-color: #4caf50;
        background-color: rgba(76, 175, 80, 0.2);
        transform: scale(1.15);
      }

      .leaf {
        position: absolute;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        cursor: grab;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
        transition:
          transform 0.1s,
          background-color 0.3s;
        z-index: 10;
        border: 2px solid rgba(255, 255, 255, 0.4);
      }

      .leaf:active {
        cursor: grabbing;
        transform: scale(1.15);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .leaf.purple {
        background-color: var(--unapi-roxo);
      }
      .leaf.yellow {
        background-color: var(--unapi-amarelo);
      }

      .leaf.snapped {
        cursor: default;
        box-shadow: none;
        transition: background-color 0.3s;
      }

      #success-message {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--unapi-fundo);
        padding: 50px 70px;
        border-radius: var(--unapi-borda);
        border: 1px solid rgba(84, 42, 88, 0.2);
        text-align: center;
        z-index: 100;
        box-shadow: var(--unapi-sombra);
      }

      #success-message h2 {
        color: #4caf50;
        font-size: 42px;
        margin: 0 0 15px 0;
      }

      #success-message p {
        font-size: 22px;
        color: var(--unapi-roxo);
      }

      .btn-restart {
        font-size: 20px;
        padding: 12px 35px;
        background-color: var(--unapi-roxo);
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition:
          background 0.3s,
          transform 0.2s;
        margin-top: 25px;
        font-weight: bold;
      }

      .btn-restart:hover {
        background-color: rgba(84, 42, 88, 0.85);
        transform: translateY(-2px);
      }

      #zone1 {
        top: 30px;
        left: 240px;
      }
      #zone2 {
        top: 100px;
        left: 360px;
      }
      #zone3 {
        top: 30px;
        left: 480px;
      }
      #zone4 {
        top: 100px;
        left: 620px;
      }
      #zone5 {
        top: 30px;
        left: 740px;
      }
      #zone6 {
        top: 100px;
        left: 860px;
      }

      #leaf1 {
        top: 625px;
        left: 180px;
      }
      #leaf2 {
        top: 625px;
        left: 320px;
      }
      #leaf3 {
        top: 625px;
        left: 460px;
      }
      #leaf4 {
        top: 625px;
        left: 600px;
      }
      #leaf5 {
        top: 625px;
        left: 740px;
      }
      #leaf6 {
        top: 625px;
        left: 880px;
      }


      .game-scale-area {
        width: 100%;
        max-width: 1100px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        overflow: visible;
        position: relative;
        z-index: 2;
      }

      #game-board {
        transform: scale(var(--game-scale, 1));
        transform-origin: top center;
        flex: 0 0 auto;
      }

      @media (max-height: 820px) {
        body {
          justify-content: flex-start;
          padding: 12px 16px;
        }

        .header-panel {
          padding: 14px 28px;
          margin-bottom: 10px;
        }

        .header-panel h1 {
          font-size: 22px;
          margin-bottom: 10px;
        }

        .instructions {
          font-size: 14px;
          gap: 6px;
          padding: 10px 18px;
        }
      }

      @media (max-width: 680px) {
        .header-panel {
          min-width: unset;
          width: 100%;
        }
      }


      /* RODAPÉ INSTITUCIONAL */
      .logos-footer {
        width: min(100%, 1100px);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(14px, 2vw, 28px);
        padding: 12px 18px;
        margin-top: 12px;
        background: rgba(255, 248, 220, 0.86);
        border: 1px solid rgba(84, 42, 88, 0.16);
        border-radius: 16px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        z-index: 60;
        position: relative;
        flex-wrap: wrap;
      }

      .logos-footer img {
        max-height: clamp(28px, 4vh, 44px);
        max-width: 150px;
        width: auto;
        object-fit: contain;
      }

      @media (max-height: 760px) {
        .logos-footer {
          padding: 8px 14px;
          margin-top: 8px;
        }

        .logos-footer img {
          max-height: 30px;
        }
      }

      @media (max-width: 700px) {
        .logos-footer {
          gap: 12px;
        }

        .logos-footer img {
          max-width: 105px;
        }
      }



      /* BOTÃO DE VOLTAR PARA A HOME - REPOSITÓRIOS SEPARADOS */
      .btn-voltar-home {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 999;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 12px;
        background: var(--unapi-roxo);
        color: var(--unapi-fundo);
        text-decoration: none;
        font-family: var(--unapi-fonte);
        font-size: 15px;
        font-weight: 800;
        box-shadow: var(--unapi-sombra);
        border: 1px solid rgba(221, 182, 34, 0.45);
        transition: transform 0.2s ease, background-color 0.2s ease, color 0.2s ease;
      }

      .btn-voltar-home:hover {
        background: #6b3b6f;
        color: var(--unapi-amarelo);
        transform: translateY(-2px);
      }

      @media (max-width: 720px) {
        .btn-voltar-home {
          top: 10px;
          left: 10px;
          padding: 8px 12px;
          font-size: 13px;
        }
      }

    </style>
  </head>
  <body>
    <a class="btn-voltar-home" href="https://teoz08.github.io/homeUnapi/">← Home</a>

    <div class="header-panel">
      <h1>Conhecendo o Mouse</h1>
      <div class="instructions">
        <span
          ><strong>Passo 1:</strong> Clique e arraste para encaixar as folhas na
          árvore.</span
        >
        <span
          ><strong>Passo 2:</strong> Use o botão direito do mouse para mudar a
          cor da folha.</span
        >
        <span
          ><strong>Passo 3:</strong> Gire a rodinha do mouse sobre a folha para
          devolvê-la.</span
        >
      </div>
    </div>

      <div class="leaves-base"></div>

      <div class="drop-zone" id="zone1"></div>
      <div class="drop-zone" id="zone2"></div>
      <div class="drop-zone" id="zone3"></div>
      <div class="drop-zone" id="zone4"></div>
      <div class="drop-zone" id="zone5"></div>
      <div class="drop-zone" id="zone6"></div>

      <div class="leaf purple" id="leaf1"></div>
      <div class="leaf yellow" id="leaf2"></div>
      <div class="leaf purple" id="leaf3"></div>
      <div class="leaf yellow" id="leaf4"></div>
      <div class="leaf purple" id="leaf5"></div>
      <div class="leaf yellow" id="leaf6"></div>

      <div id="success-message">
        <h2>Parabéns!</h2>
        <p>Você completou a árvore perfeitamente!</p>
        <button class="btn-restart" id="btn-retry">Jogar Novamente</button>
      </div>
      </div>
    </div>

    <footer class="logos-footer" aria-label="Logos institucionais">
      <img src="img/ufms.png" alt="UFMS" />
      <img src="img/unapi.png" alt="UnAPI" />
      <img src="img/gov-federal.png" alt="Governo Federal" />
      <img src="img/facom.png" alt="FACOM" />
      <img src="img/pet-sistemas.png" alt="PET Sistemas" />
      <img src="img/pet-computacao.png" alt="PET Computação" />
    </footer>

    <script>
      const leaves = document.querySelectorAll(".leaf");
      const dropZones = document.querySelectorAll(".drop-zone");
      const board = document.getElementById("game-board");
      const successMessage = document.getElementById("success-message");
      const btnRetry = document.getElementById("btn-retry");

      let activeLeaf = null;
      let offsetX = 0;
      let offsetY = 0;
      let leavesPlaced = 0;
      let gameScale = 1;

      const initialPositions = [];
      leaves.forEach((leaf, index) => {
        const computedStyle = window.getComputedStyle(leaf);
        initialPositions[index] = {
          top: computedStyle.top,
          left: computedStyle.left,
        };
      });

      function ajustarEscalaJogo() {
        const scaleArea = document.querySelector(".game-scale-area");
        const headerPanel = document.querySelector(".header-panel");
        const footer = document.querySelector(".logos-footer");

        const availableWidth = Math.max(320, window.innerWidth - 32);
        const headerHeight = headerPanel ? headerPanel.offsetHeight : 0;
        const footerHeight = footer ? footer.offsetHeight : 0;
        const availableHeight = Math.max(
          360,
          window.innerHeight - headerHeight - footerHeight - 72,
        );

        const scaleByWidth = availableWidth / 1100;
        const scaleByHeight = availableHeight / 700;
        gameScale = Math.max(0.55, Math.min(1, scaleByWidth, scaleByHeight));

        document.documentElement.style.setProperty("--game-scale", gameScale);

        if (scaleArea) {
          scaleArea.style.height = 700 * gameScale + "px";
        }
      }

      window.addEventListener("load", ajustarEscalaJogo);
      window.addEventListener("resize", ajustarEscalaJogo);

      btnRetry.addEventListener("click", () => {
        successMessage.style.display = "none";
        leavesPlaced = 0;

        leaves.forEach((leaf, index) => {
          leaf.classList.remove("snapped");
          leaf.style.top = initialPositions[index].top;
          leaf.style.left = initialPositions[index].left;
          leaf.style.zIndex = 10;
          delete leaf.dataset.zoneId;
        });

        dropZones.forEach((zone) => {
          zone.removeAttribute("data-filled");
          zone.classList.remove("hover");
        });
      });

      leaves.forEach((leaf) => {
        leaf.addEventListener("pointerdown", (e) => {
          if (e.button === 2) return;
          if (leaf.classList.contains("snapped")) return;

          activeLeaf = leaf;
          const rect = leaf.getBoundingClientRect();
          offsetX = (e.clientX - rect.left) / gameScale;
          offsetY = (e.clientY - rect.top) / gameScale;

          activeLeaf.style.zIndex = 100;
          leaf.setPointerCapture(e.pointerId);
        });

        leaf.addEventListener("contextmenu", (e) => {
          e.preventDefault();

          if (leaf.classList.contains("purple")) {
            leaf.classList.remove("purple");
            leaf.classList.add("yellow");
          } else {
            leaf.classList.remove("yellow");
            leaf.classList.add("purple");
          }
        });

        leaf.addEventListener("wheel", (e) => {
          e.preventDefault();

          if (leaf.classList.contains("snapped")) {
            const zoneId = leaf.dataset.zoneId;
            if (zoneId) {
              document.getElementById(zoneId).removeAttribute("data-filled");
              delete leaf.dataset.zoneId;
            }

            const index = Array.from(leaves).indexOf(leaf);
            leaf.style.top = initialPositions[index].top;
            leaf.style.left = initialPositions[index].left;

            leaf.classList.remove("snapped");
            leaf.style.zIndex = 10;

            leavesPlaced--;

            successMessage.style.display = "none";
          }
        });
      });

      board.addEventListener("pointermove", (e) => {
        if (!activeLeaf) return;

        const boardRect = board.getBoundingClientRect();

        let newLeft = (e.clientX - boardRect.left) / gameScale - offsetX;
        let newTop = (e.clientY - boardRect.top) / gameScale - offsetY;

        newLeft = Math.max(
          0,
          Math.min(newLeft, board.offsetWidth - activeLeaf.offsetWidth),
        );
        newTop = Math.max(
          0,
          Math.min(newTop, board.offsetHeight - activeLeaf.offsetHeight),
        );

        activeLeaf.style.left = newLeft + "px";
        activeLeaf.style.top = newTop + "px";

        checkHoverEffects();
      });

      board.addEventListener("pointerup", (e) => {
        if (!activeLeaf) return;

        dropZones.forEach((zone) => zone.classList.remove("hover"));

        let snapped = false;
        for (let zone of dropZones) {
          if (!zone.hasAttribute("data-filled")) {
            const leafRect = activeLeaf.getBoundingClientRect();
            const zoneRect = zone.getBoundingClientRect();

            const leafCenterX = leafRect.left + leafRect.width / 2;
            const leafCenterY = leafRect.top + leafRect.height / 2;
            const zoneCenterX = zoneRect.left + zoneRect.width / 2;
            const zoneCenterY = zoneRect.top + zoneRect.height / 2;

            const distance = Math.hypot(
              leafCenterX - zoneCenterX,
              leafCenterY - zoneCenterY,
            );

            if (distance < 50 * gameScale) {
              // Encaixe preciso: usa a posição real da zona no tabuleiro,
              // sem considerar o efeito visual de hover/scale.
              activeLeaf.style.left =
                zone.offsetLeft + (zone.offsetWidth - activeLeaf.offsetWidth) / 2 + "px";
              activeLeaf.style.top =
                zone.offsetTop + (zone.offsetHeight - activeLeaf.offsetHeight) / 2 + "px";

              activeLeaf.classList.add("snapped");
              zone.setAttribute("data-filled", "true");
              activeLeaf.dataset.zoneId = zone.id;

              activeLeaf.style.zIndex = 10;
              snapped = true;
              leavesPlaced++;

              if (leavesPlaced === leaves.length) {
                setTimeout(() => {
                  successMessage.style.display = "block";
                }, 400);
              }
              break;
            }
          }
        }

        activeLeaf.releasePointerCapture(e.pointerId);
        if (!snapped) activeLeaf.style.zIndex = 10;
        activeLeaf = null;
      });

      function checkHoverEffects() {
        const leafRect = activeLeaf.getBoundingClientRect();
        const leafCenterX = leafRect.left + leafRect.width / 2;
        const leafCenterY = leafRect.top + leafRect.height / 2;

        dropZones.forEach((zone) => {
          if (!zone.hasAttribute("data-filled")) {
            const zoneRect = zone.getBoundingClientRect();
            const zoneCenterX = zoneRect.left + zoneRect.width / 2;
            const zoneCenterY = zoneRect.top + zoneRect.height / 2;

            const distance = Math.hypot(
              leafCenterX - zoneCenterX,
              leafCenterY - zoneCenterY,
            );

            if (distance < 50 * gameScale) {
              zone.classList.add("hover");
            } else {
              zone.classList.remove("hover");
            }
          }
        });
      }
    </script>
